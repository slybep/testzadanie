services:
  url-api:
    container_name: UrlShorter
    build: . 
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=URL_db;User=root;Password=123456;
    networks:
      - url-network
    depends_on:
      - mysql_db

  mysql_db:
    container_name: mysql
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: URL_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - url-network

volumes:
  mysql_data:

networks:
  url-network: